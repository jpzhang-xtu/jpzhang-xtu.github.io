    Publications:
      - title: Fast Augmented Lagrangian Primal Dual Algorithm for Mean Curvature Regularization Model
        authors:
          - Tianle Lu, Jianping Zhang*, Yuping Duan*, Ke Chen
        publisher: J. Math. Imaging Vis
        releaseDate: 2026-07-22
        url: https://ieeexplore.ieee.org/document/11087444/
        summary: This paper proposes a novel computational framework for a class of mean-curvature-type models by integrating the Legendre–Fenchel transform within a primal–dual augmented Lagrangian formulation. By leveraging the duality properties of the Legendre–Fenchel transform, we reformulate the original nonlinear problem into a structured saddle-point problem. A distinguished feature of the proposed framework is its streamlined structure, which requires fewer auxiliary variables than traditional variable-splitting-based augmented Lagrangian methods. This reduction leads to enhanced computational efficiency and lower memory requirements.

      - title: A Progressive Image Restoration Network for High-Order Degradation Imaging in Remote Sensing
        authors:
          - Yujie Feng, Ying Yang, Xiaohong Fan, Zhengpeng Zhang, Lijing Bu and Jianping Zhang*
        publisher: IEEE Transactions on Geoscience and Remote Sensing
        releaseDate: 2025-03-18
        url: https://ieeexplore.ieee.org/document/11087445/
        summary: This paper proposes a novel progressive image restoration network for high-order degradation imaging (HDI-PRNet), to progressively restore different image degradation. HDI-PRNet is developed based on the theoretical framework of degradation imaging, also Markov properties of the high-order degradation process and Maximum a posteriori (MAP) estimation, offering the benefit of mathematical interpretability within the unfolding network.

      - title: Nest-DGIL-- Nesterov-optimized Deep Geometric Incremental Learning for CS Image Reconstruction.
        authors:
          - Xiaohong Fan, Yin Yang, Ke Chen, Yujie Feng, Jianping Zhang*
        publisher: IEEE Transactions on Computational Imaging
        releaseDate: 2023-09-15
        url: https://doi.org/10.1109/TCI.2023.3315853
        summary: This paper proposes a deep geometric incremental learning framework based on the second Nesterov proximal gradient optimization. The proposed end-to-end network not only has the powerful learning ability for high-/low-frequency image features, but also can theoretically guarantee that geometric texture details will be reconstructed from preliminary linear reconstruction.
      
      - title: Diffeomorphic Image Registration with an Optimal Control Relaxation and Its Implementation
        authors:
          - Jianping Zhang*, Yanyan Li
        publisher: SIAM Journal on Imaging Sciences
        releaseDate: 2021-12-14
        url: https://epubs.siam.org/doi/10.1137/21M1391274
        summary: In this paper, we propose a new registration model based on an optimal control relaxation constraint for large deformation images, which can theoretically guarantee that the registration mapping is diffeomorphic. We present an analysis of optimal control relaxation for indirectly seeking the diffeomorphic transformation of the Jacobian determinant equation and its registration applications, including the construction of diffeomorphic transformation as a special space. We also provide an existence result for the control increment optimization problem in the proposed diffeomorphic image registration model with an optimal control relaxation. 

      - title: A Total Fractional-Order Variation Model for Image Restoration with Nonhomogeneous Boundary Conditions and Its Numerical Solution.
        authors:
          - Jianping Zhang, Ke Chen
        publisher: SIAM Journal on Imaging Sciences
        releaseDate: 2015-11-05
        url: https://epubs.siam.org/doi/10.1137/14097121X
        summary: This paper first reviews some results of fractional-order derivatives and then analyzes the theoretical properties of the proposed total $\alpha$-order variational model rigorously. It then develops four algorithms for solving the variational problem---one based on the variational Split-Bregman idea and three based on direct solution of the discretize-optimization problem.

      - title: An Iterative Lagrange Multiplier Method for Constrained Total-Variation-Based Image Denoising.
        authors:
          - Jianping Zhang, Ke Chen, Bo Yu
        publisher: SIAM Journal on Numerical Analysis
        releaseDate: 2012-05-03
        url: https://epubs.siam.org/doi/10.1137/110829209
        summary: This paper presents an iterative update algorithm for a Lagrange multiplier to solve the KKT conditions, and our proposed method can adaptively deal with noisy images with different variances $\sigma^2$. 

